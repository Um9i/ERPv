services:
  db:
    image: postgres:latest
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - erpv_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    restart: always
    env_file: .env
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_SSL_REQUIRE=${DB_SSL_REQUIRE:-0}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - staticfiles:/app/staticfiles:z
      - media:/app/media:z
    depends_on:
      - db
    networks:
      - erpv_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  erpv_net:
    driver: bridge

volumes:
  postgres_data:
  staticfiles:
  media:
