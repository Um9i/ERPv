services:
  db:
    image: postgres:17
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - erpv_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-erpv}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    restart: always
    env_file: .env
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_SSL_REQUIRE=${DB_SSL_REQUIRE:-0}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - /var/www/erpv/staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erpv_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  erpv_net:
    driver: bridge

volumes:
  postgres_data:
  media:
