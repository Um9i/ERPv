name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check formatting (ruff)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Lint migrations
        run: python manage.py lintmigrations --no-cache --ignore-sqlmigrate-errors --exclude-apps silk
        env:
          DEBUG: "True"
          SECRETKEY: "ci-test-key"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Security lint (bandit)
        run: bandit -r config/ dashboards/ finance/ inventory/ main/ procurement/ production/ sales/ -x '*/migrations/*' --severity-level medium

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Type check (mypy)
        run: >
          mypy finance/
          config/models.py dashboards/models.py
          inventory/models.py inventory/services.py
          sales/models.py sales/services.py
          procurement/models.py procurement/services.py
          production/models.py production/services.py
        env:
          DEBUG: "True"
          SECRETKEY: "ci-test-key"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev weasyprint

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
        env:
          DJANGO_SETTINGS_MODULE: main.settings
          DEBUG: "True"
          SECRETKEY: "ci-test-key"

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erpv .
