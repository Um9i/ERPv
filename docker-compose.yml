services:
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erpv}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             exec gunicorn main.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app:Z
      - media:/app/media:z
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@db:5432/${POSTGRES_DB:-erpv}?sslmode=disable
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SETTINGS_MODULE=main.settings
    depends_on:
      - db

volumes:
  postgres_data:
  media:
