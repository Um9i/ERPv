<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Box-seam icon inspired by Bootstrap Icons bi-box-seam -->
  <g fill="none" stroke="url(#g)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer box -->
    <path d="M32 14 L50 24 L50 44 L32 54 L14 44 L14 24 Z"/>
    <!-- centre seam -->
    <line x1="32" y1="14" x2="32" y2="54"/>
    <!-- side flaps -->
    <line x1="14" y1="24" x2="32" y2="34"/>
    <line x1="50" y1="24" x2="32" y2="34"/>
  </g>
</svg>
