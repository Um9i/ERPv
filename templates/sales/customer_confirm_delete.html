{% extends "base.html" %}
{% block content %}
<h1>Delete Customer</h1>
<p>Are you sure you want to delete {{ customer.name }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'sales:customer-detail' customer.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
