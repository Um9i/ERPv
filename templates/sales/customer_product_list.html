{% extends "base.html" %}
{% load currency_tags %}
{% block content %}
<h1>Products for {{ customer.name }}</h1>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        {% for cp in customer_products %}
        <tr>
            <td>{{ cp.product.name }}</td>
            <td>{{ cp.price|currency }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
