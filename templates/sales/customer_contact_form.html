{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h1>{% if object %}Edit{% else %}New{% endif %} Customer Contact</h1>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% if object %}{% url 'sales:customer-detail' object.customer.pk %}{% else %}#{% endif %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
