{% extends "base.html" %}
{% block content %}
<h1>Delete Customer Contact</h1>
<p>Are you sure you want to delete "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'sales:customer-detail' object.customer.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
