{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
{% if form.instance.pk %}
<h1>Edit BOM</h1>
{% else %}
<h1>New Bill of Materials</h1>
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
