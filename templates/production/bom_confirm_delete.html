{% extends "base.html" %}
{% block content %}
<h1>Delete BOM</h1>
<p>Are you sure you want to delete BOM for {{ bom.product.name }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'production:bom-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
