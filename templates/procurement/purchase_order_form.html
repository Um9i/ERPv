{% extends "base.html" %}
{% block content %}
<h1>Create Purchase Order</h1>
<form method="post" id="po-form">
    {% csrf_token %}
    {{ form.as_p }}

    <h3>Order Lines</h3>
    {{ lines_formset.management_form }}
    <div id="lines-container">
    {% for line_form in lines_formset %}
    <div class="card mb-3 p-3 line-form">
        {{ line_form.as_p }}
        {% if line_form.instance.pk %}
        <hr>
        {% endif %}
    </div>
    {% endfor %}
    </div>

    <button type="button" class="btn btn-secondary" id="add-line">Add another line</button>
    <button type="submit" class="btn btn-primary">Save</button>
</form>

<script>
// simple formset helper: clone last form and update indexes
(function() {
    const addBtn = document.getElementById('add-line');
    const container = document.getElementById('lines-container');
    addBtn.addEventListener('click', function() {
        const totalForms = document.getElementById('id_purchase_order_lines-TOTAL_FORMS');
        let formCount = parseInt(totalForms.value, 10);
        const emptyForm = document.querySelector('#lines-container .line-form:last-child').cloneNode(true);
        // adjust inputs in cloned form
        emptyForm.querySelectorAll('input, select, textarea').forEach(function(el) {
            if (el.name) {
                el.name = el.name.replace(/-(\d+)-/, `-${formCount}-`);
                el.id = 'id_' + el.name;
                if (el.type !== 'hidden') el.value = '';
            }
        });
        container.appendChild(emptyForm);
        totalForms.value = formCount + 1;
    });
})();
</script>
{% endblock %}
