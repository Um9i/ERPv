{% extends "base.html" %}
{% block content %}
<h1>{% if form.instance.pk %}Update{% else %}Create{% endif %} Product</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">{% if form.instance.pk %}Update{% else %}Create{% endif %}</button>
</form>
{% endblock %}
