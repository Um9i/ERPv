{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h1>{% if form.instance.pk %}Update{% else %}Create{% endif %} Product</h1>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-success" type="submit">{% if form.instance.pk %}Update{% else %}Create{% endif %}</button>
</form>
{% endblock %}
