{% extends "base.html" %}
{% block content %}
<h1>Delete Product</h1>
<p>Are you sure you want to delete "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'inventory:inventory-list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
