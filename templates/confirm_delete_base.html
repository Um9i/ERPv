{% extends "base.html" %}
{% block content %}
<h1>{% block delete_title %}Delete Item{% endblock %}</h1>
<p>{% block delete_message %}Are you sure you want to delete this item?{% endblock %}</p>
<form method="post"{% block delete_form_action %}{% endblock %}>
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        {% block delete_submit %}Delete{% endblock %}
    </button>
    <a href="{% block delete_cancel_url %}{% url 'dashboard' %}{% endblock %}"
       class="btn btn-secondary">
        {% block delete_cancel %}Cancel{% endblock %}
    </a>
</form>
{% endblock %}
