{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 40vh;">
    <div class="delete-confirm-panel">
        <div class="delete-confirm-icon">
            <i class="bi bi-exclamation-triangle" aria-hidden="true"></i>
        </div>
        <h2 class="delete-confirm-title">{% block delete_title %}Delete Item{% endblock %}</h2>
        <p class="delete-confirm-text">{% block delete_message %}Are you sure you want to delete this item? This action cannot be undone.{% endblock %}</p>
        <form method="post"{% block delete_form_action %}{% endblock %}>
            {% csrf_token %}
            <div class="delete-confirm-actions">
                <a href="{% block delete_cancel_url %}{% url 'home' %}{% endblock %}"
                   class="btn btn-app-secondary">
                    {% block delete_cancel %}Cancel{% endblock %}
                </a>
                <button type="submit" class="btn btn-danger">
                    {% block delete_submit %}Delete{% endblock %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
