{% extends "base.html" %}
{% block head %}
  <title>Reset link sent – ERPv</title>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-box-seam"></i></div>
            <h2 class="auth-title">Check your email</h2>
            <p class="auth-subtitle">If an account exists with that email address, we've sent a password reset link.</p>
        </div>
        <p class="auth-footer">
            <a href="{% url 'login' %}" class="auth-link">Back to sign in</a>
        </p>
    </div>
</div>
{% endblock %}
