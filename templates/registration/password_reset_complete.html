{% extends "base.html" %}
{% block head %}
  <title>Password reset complete – ERPv</title>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-box-seam" aria-hidden="true"></i></div>
            <h2 class="auth-title">Password reset complete</h2>
            <p class="auth-subtitle">Your password has been set. You can now sign in with your new password.</p>
        </div>
        <a href="{% url 'login' %}" class="btn btn-hero-primary w-100">Sign in</a>
    </div>
</div>
{% endblock %}
