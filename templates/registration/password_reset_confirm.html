{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block head %}
  <title>Set new password – ERPv</title>
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-box-seam" aria-hidden="true"></i></div>
            <h2 class="auth-title">Set a new password</h2>
            <p class="auth-subtitle">Enter your new password below.</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-hero-primary w-100 mt-2">Reset password</button>
        </form>
    </div>
</div>
{% endblock %}
