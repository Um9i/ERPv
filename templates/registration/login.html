{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-box-seam"></i></div>
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your ERPv account</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-hero-primary w-100 mt-2">Sign in</button>
        </form>
        <p class="auth-footer">
            <a href="{% url 'password_reset' %}" class="auth-link">Forgot your password?</a>
        </p>
        <p class="auth-footer">
            Don't have an account? <a href="{% url 'django_registration_register' %}" class="auth-link">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
