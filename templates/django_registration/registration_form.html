{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"><i class="bi bi-box-seam" aria-hidden="true"></i></div>
            <h2 class="auth-title">Create your account</h2>
            <p class="auth-subtitle">Get started with ERPv</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-hero-primary w-100 mt-2">Create account</button>
        </form>
        <p class="auth-footer">
            Already have an account? <a href="{% url 'login' %}" class="auth-link">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
