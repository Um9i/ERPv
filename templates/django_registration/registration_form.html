{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="d-flex justify-content-center align-items-center vh-75">
    <div class="card shadow-lg w-100" style="max-width: 400px;">
        <div class="card-body">
            <h2 class="card-title text-center mb-3">Create Account</h2>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
