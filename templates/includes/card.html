{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div class="page-header-content">
        <div class="page-header-icon"><i class="bi {% block card_icon %}bi-gear-fill{% endblock %}"></i></div>
        <div>
            <h1 class="page-title">{% block card_title %}{% endblock %}</h1>
        </div>
    </div>
</div>
<div class="content-panel">
    {% block card_header %}{% endblock %}
    {% block card_body %}{% endblock %}
</div>
{% endblock %}
