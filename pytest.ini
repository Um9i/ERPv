[pytest]
DJANGO_SETTINGS_MODULE = main.settings
# -- recommended but optional:
python_files = tests.py test_*.py *_tests.py
addopts = --nomigrations -n auto --cov=. --cov-report=term-missing --cov-fail-under=85 --durations=30 --durations-min=0.1
markers =
    unit: Pure unit tests — no HTTP client, no multi-component workflows.
    integration: Integration tests — HTTP client, view responses, cross-module workflows.
    e2e: End-to-end tests — full cross-module flows from procurement through production to sales.
    no_auto_permissions: Opt out of the auto-grant ERP permissions fixture.
env =
    DEBUG=True
    SECRETKEY=test-secret
    CACHE_BACKEND=django.core.cache.backends.dummy.DummyCache
