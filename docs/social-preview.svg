<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="rgba(15,23,42,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a"/>

  <!-- Subtle top glow -->
  <ellipse cx="640" cy="0" rx="700" ry="300" fill="url(#heroGlow)"/>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Favicon / Logo icon (box-seam) -->
  <g transform="translate(540,80) scale(1.5)" filter="glow">
    <g fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
      <path d="M32 14 L50 24 L50 44 L32 54 L14 44 L14 24 Z"/>
      <line x1="32" y1="14" x2="32" y2="54"/>
      <line x1="14" y1="24" x2="32" y2="34"/>
      <line x1="50" y1="24" x2="32" y2="34"/>
    </g>
  </g>

  <!-- Title: ERPv -->
  <text x="640" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="88" font-weight="800" letter-spacing="-2">
    <tspan fill="#f1f5f9">ERP</tspan><tspan fill="url(#accent)">v</tspan>
  </text>

  <!-- Tagline -->
  <text x="640" y="270" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8" font-weight="400" letter-spacing="0.5">
    Open-Source ERP for Manufacturers &amp; Distributors
  </text>

  <!-- Divider line -->
  <line x1="540" y1="300" x2="740" y2="300" stroke="#1e293b" stroke-width="1"/>

  <!-- Module pills row -->
  <!-- Inventory -->
  <rect x="218" y="330" width="130" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="283" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Inventory</text>

  <!-- Procurement -->
  <rect x="368" y="330" width="150" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="443" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Procurement</text>

  <!-- Sales -->
  <rect x="538" y="330" width="100" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="588" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Sales</text>

  <!-- Production -->
  <rect x="658" y="330" width="130" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="723" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Production</text>

  <!-- Finance -->
  <rect x="808" y="330" width="112" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="864" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Finance</text>

  <!-- Dashboards -->
  <rect x="940" y="330" width="132" height="38" rx="19" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="1006" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#c7d2fe" font-weight="500">Dashboards</text>

  <!-- Stats row -->
  <!-- Stat cards -->
  <g filter="softShadow">
    <!-- Card 1 -->
    <rect x="180" y="420" width="200" height="90" rx="12" fill="url(#cardGlow)" stroke="#1e293b" stroke-width="1"/>
    <text x="280" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="url(#accent)" font-weight="700">6</text>
    <text x="280" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="500" letter-spacing="1.5">CORE MODULES</text>

    <!-- Card 2 -->
    <rect x="420" y="420" width="200" height="90" rx="12" fill="url(#cardGlow)" stroke="#1e293b" stroke-width="1"/>
    <text x="520" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="url(#accent)" font-weight="700">100%</text>
    <text x="520" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="500" letter-spacing="1.5">OPEN SOURCE</text>

    <!-- Card 3 -->
    <rect x="660" y="420" width="200" height="90" rx="12" fill="url(#cardGlow)" stroke="#1e293b" stroke-width="1"/>
    <text x="760" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="url(#accent)" font-weight="700">Docker</text>
    <text x="760" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="500" letter-spacing="1.5">READY TO DEPLOY</text>

    <!-- Card 4 -->
    <rect x="900" y="420" width="200" height="90" rx="12" fill="url(#cardGlow)" stroke="#1e293b" stroke-width="1"/>
    <text x="1000" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" fill="url(#accent)" font-weight="700">500+</text>
    <text x="1000" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="500" letter-spacing="1.5">TESTS PASSING</text>
  </g>

  <!-- Tech stack footer -->
  <text x="640" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569" font-weight="400" letter-spacing="0.5">
    Django  ·  Python 3.14  ·  PostgreSQL  ·  HTMX  ·  Docker
  </text>

  <!-- GitHub URL -->
  <text x="640" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#64748b" font-weight="400">
    github.com/Um9i/ERPv
  </text>
</svg>
